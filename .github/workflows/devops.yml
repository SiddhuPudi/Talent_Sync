name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ──────────────────────────────────────────────
#  Job 1 — Frontend (lint, build, Docker image)
# ──────────────────────────────────────────────
jobs:
  frontend:
    name: 🖥️ Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Node modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-frontend-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-frontend-

      - name: Install Dependencies
        working-directory: ./frontend
        run: npm ci || npm install

      - name: Lint
        working-directory: ./frontend
        run: npm run lint || true

      - name: Build
        working-directory: ./frontend
        run: npm run build || true

      - name: Build Docker Image
        run: docker build -t talent-sync-frontend ./frontend

      - name: Save Docker Image
        run: docker save talent-sync-frontend -o /tmp/frontend-image.tar

      - name: Upload Docker Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-image
          path: /tmp/frontend-image.tar
          retention-days: 1

  # ──────────────────────────────────────────────
  #  Job 2 — Backend (install, Docker image)
  # ──────────────────────────────────────────────
  backend:
    name: ⚙️ Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Node modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-backend-${{ hashFiles('Backend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-backend-

      - name: Install Dependencies
        working-directory: ./Backend
        run: npm ci || npm install

      - name: Run Backend Tests
        working-directory: ./Backend
        run: npm test

      - name: Build Docker Image
        run: docker build -t talent-sync-backend ./Backend

      - name: Save Docker Image
        run: docker save talent-sync-backend -o /tmp/backend-image.tar

      - name: Upload Docker Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-image
          path: /tmp/backend-image.tar
          retention-days: 1

  # ──────────────────────────────────────────────
  #  Job 3 — Integration (Docker Compose + Health)
  # ──────────────────────────────────────────────
  integration:
    name: 🧪 Integration Test
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    environment: Backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Backend Docker Image
        uses: actions/download-artifact@v4
        with:
          name: backend-image
          path: /tmp

      - name: Download Frontend Docker Image
        uses: actions/download-artifact@v4
        with:
          name: frontend-image
          path: /tmp

      - name: Load Docker Images
        run: |
          docker load -i /tmp/backend-image.tar
          docker load -i /tmp/frontend-image.tar

      - name: Run Docker Compose
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: docker compose up -d

      - name: Wait for services to start
        run: sleep 25

      - name: Check running containers
        run: docker ps

      - name: Health Check — Containers
        run: |
          docker ps --format "{{.Names}}: {{.Status}}" | while read line; do
            echo "✅ $line"
          done

      - name: Teardown
        if: always()
        run: docker compose down

  # ──────────────────────────────────────────────
  #  Job 4 — Deploy to Production (main branch)
  # ──────────────────────────────────────────────
  deploy-production:
    name: 🚀 Deploy Production
    runs-on: ubuntu-latest
    needs: [integration]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy Backend to Render
        run: |
          echo "🚀 Deploying Backend to Render (Production)..."
          curl -sf -X POST ${{ secrets.RENDER_DEPLOY_HOOK }} || echo "⚠️ Render deploy hook failed"

      - name: Deploy Frontend to Vercel
        run: |
          echo "🚀 Deploying Frontend to Vercel (Production)..."
          curl -sf -X POST ${{ secrets.VERCEL_DEPLOY_HOOK }} || echo "⚠️ Vercel deploy hook failed"

      - name: Wait for deployments to propagate
        run: sleep 30

      - name: Health Check — Backend (Production)
        run: |
          echo "🏥 Checking Backend health..."
          curl -f https://talent-sync-pq7j.onrender.com/ || exit 1
          echo "✅ Backend is healthy!"

      - name: Health Check — Frontend (Production)
        run: |
          echo "🏥 Checking Frontend health..."
          curl -f https://talent-sync-green.vercel.app/ || exit 1
          echo "✅ Frontend is healthy!"

  # ──────────────────────────────────────────────
  #  Job 5 — Deploy to Staging (dev branch)
  # ──────────────────────────────────────────────
  deploy-staging:
    name: 🧪 Deploy Staging
    runs-on: ubuntu-latest
    needs: [integration]
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    environment: staging

    steps:
      - name: Deploy Backend to Staging
        run: |
          echo "🧪 Deploying Backend to Staging..."
          curl -sf -X POST ${{ secrets.RENDER_STAGING_DEPLOY_HOOK }} || echo "⚠️ Staging deploy hook failed"

      - name: Deploy Frontend to Staging
        run: |
          echo "🧪 Deploying Frontend to Staging..."
          curl -sf -X POST ${{ secrets.VERCEL_STAGING_DEPLOY_HOOK }} || echo "⚠️ Staging deploy hook failed"