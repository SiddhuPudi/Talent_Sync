name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ──────────────────────────────────────────────
#  Job 1 — Frontend (lint, build, Docker image)
# ──────────────────────────────────────────────
jobs:
  frontend:
    name: 🖥️ Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Node modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-frontend-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-frontend-

      - name: Install Dependencies
        working-directory: ./frontend
        run: npm ci || npm install

      - name: Lint
        working-directory: ./frontend
        run: npm run lint || true

      - name: Build
        working-directory: ./frontend
        run: npm run build

      - name: Build Docker Image
        run: docker build -t talent-sync-frontend ./frontend

      - name: Save Docker Image
        run: docker save talent-sync-frontend -o /tmp/frontend-image.tar

      - name: Upload Docker Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-image
          path: /tmp/frontend-image.tar
          retention-days: 1

  # ──────────────────────────────────────────────
  #  Job 2 — Backend (install, Docker image)
  # ──────────────────────────────────────────────
  backend:
    name: ⚙️ Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Node modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-backend-${{ hashFiles('Backend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-backend-

      - name: Install Dependencies
        working-directory: ./Backend
        run: npm ci || npm install

      - name: Run Backend Tests
        working-directory: ./Backend
        env:
          NODE_ENV: test
        run: npm test -- --ci

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: Backend/coverage/
          retention-days: 7

      - name: Build Docker Image
        run: docker build -t talent-sync-backend ./Backend

      - name: Save Docker Image
        run: docker save talent-sync-backend -o /tmp/backend-image.tar

      - name: Upload Docker Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-image
          path: /tmp/backend-image.tar
          retention-days: 1

  # ──────────────────────────────────────────────
  #  Job 3 — Integration (Docker Compose + Health)
  # ──────────────────────────────────────────────
  integration:
    name: 🧪 Integration Test
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    environment: Backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Backend Docker Image
        uses: actions/download-artifact@v4
        with:
          name: backend-image
          path: /tmp

      - name: Download Frontend Docker Image
        uses: actions/download-artifact@v4
        with:
          name: frontend-image
          path: /tmp

      - name: Load Docker Images
        run: |
          docker load -i /tmp/backend-image.tar
          docker load -i /tmp/frontend-image.tar

      - name: Run Docker Compose
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: docker compose up -d

      - name: Health Check — Backend Container
        run: |
          echo "🏥 Checking backend health endpoint..."
          for i in $(seq 1 10); do
            if curl -sf http://localhost:3000/health; then
              echo ""
              echo "✅ Backend is healthy!"
              exit 0
            fi
            echo "⏳ Attempt $i/10 — waiting 5s..."
            sleep 5
          done
          echo "❌ Backend health check failed after 10 attempts"
          docker logs backend
          exit 1

      - name: Health Check — Frontend Container
        run: |
          echo "🏥 Checking frontend..."
          curl -sf http://localhost:5173/ || {
            echo "❌ Frontend is not responding"
            docker logs frontend
            exit 1
          }
          echo "✅ Frontend is healthy!"

      - name: Check running containers
        run: docker ps

      - name: Teardown
        if: always()
        run: docker compose down

  # ──────────────────────────────────────────────
  #  Job 4 — Deploy to Production (main branch)
  # ──────────────────────────────────────────────
  deploy-production:
    name: 🚀 Deploy Production
    runs-on: ubuntu-latest
    needs: [integration]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy Backend to Render
        run: |
          echo "🚀 Deploying Backend to Render (Production)..."
          curl -sf -w "\n" -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}
          echo "✅ Render deploy hook triggered successfully"

      - name: Deploy Frontend to Vercel
        run: |
          echo "🚀 Deploying Frontend to Vercel (Production)..."
          curl -sf -w "\n" -X POST ${{ secrets.VERCEL_DEPLOY_HOOK }}
          echo "✅ Vercel deploy hook triggered successfully"

      - name: Health Check — Backend (Production)
        run: |
          echo "🏥 Checking Backend health..."
          for i in 1 2 3 4 5 6; do
            if curl -sf https://talent-sync-pq7j.onrender.com/health; then
              echo ""
              echo "✅ Backend is healthy!"
              exit 0
            fi
            wait=$((i * 15))
            echo "⏳ Attempt $i/6 — waiting ${wait}s..."
            sleep $wait
          done
          echo "❌ Backend health check failed after retries"
          exit 1

      - name: Health Check — Frontend (Production)
        run: |
          echo "🏥 Checking Frontend health..."
          curl -sf --retry 3 --retry-delay 10 https://talent-sync-green.vercel.app/ || exit 1
          echo "✅ Frontend is healthy!"

  # ──────────────────────────────────────────────
  #  Job 5 — Deploy to Staging (dev branch)
  # ──────────────────────────────────────────────
  deploy-staging:
    name: 🧪 Deploy Staging
    runs-on: ubuntu-latest
    needs: [integration]
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    environment: staging

    steps:
      - name: Deploy Backend to Staging
        run: |
          echo "🧪 Deploying Backend to Staging..."
          curl -sf -w "\n" -X POST ${{ secrets.RENDER_STAGING_DEPLOY_HOOK }}
          echo "✅ Staging backend deploy triggered"

      - name: Deploy Frontend to Staging
        run: |
          echo "🧪 Deploying Frontend to Staging..."
          curl -sf -w "\n" -X POST ${{ secrets.VERCEL_STAGING_DEPLOY_HOOK }}
          echo "✅ Staging frontend deploy triggered"